name: Deploy EAS Update

on:
  push:
    branches:
      - main # Change this to 'master' if your main branch is called master

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download your code from GitHub to the virtual computer
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # Step 3: Install your project packages (npm install)
      - name: Install dependencies
        run: npm install

      # Step 4: Install and configure Expo tools
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }} # Uses the secret token we will set in Step 3

      # Step 5: Automatically deploy the update to your Expo account
      - name: Publish EAS Update
        run: eas update --auto --platform ios --platform android # <-- Add the platform flags here
